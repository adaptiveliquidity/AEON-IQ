services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB:       memoryos
      POSTGRES_USER:     memoryos
      POSTGRES_PASSWORD: memoryos_secret
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoryos -d memoryos"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Mock OpenAI server ────────────────────────────────────────────────────
  mock-openai:
    image: python:3.11-slim
    volumes:
      - ./mock_openai_server.py:/app/mock_openai_server.py:ro
    command: python3 /app/mock_openai_server.py
    environment:
      MOCK_PORT: "11435"
      EMBEDDING_DIMENSION: "1536"
      MOCK_EMBEDDING_MODE: ${MOCK_EMBEDDING_MODE:-hash}
      MOCK_ARCHIVAL_COMPACTION: ${MOCK_ARCHIVAL_COMPACTION:-true}
    ports:
      - "11435:11435"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:11435/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MemoryOS Kernel (Rust proxy) ───────────────────────────────────────────
  memoryos:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL:               postgresql://memoryos:memoryos_secret@postgres:5432/memoryos
      UPSTREAM_BASE_URL:          http://mock-openai:11435
      UPSTREAM_PROVIDER:          openai
      OPENAI_API_KEY:             sk-mock-test-key-not-real
      EXTRACTOR_MODEL:            gpt-4o-mini
      EMBEDDING_MODEL:            text-embedding-3-small
      EMBEDDING_BASE_URL:         http://mock-openai:11435
      EXTRACTOR_BASE_URL:         http://mock-openai:11435
      RETRIEVAL_THRESHOLD:        "0.95"
      ARCHIVAL_INTERVAL_HOURS:    "24"
      ARCHIVAL_MIN_AGE_DAYS:      "0"
      ARCHIVAL_MIN_MEMORIES:      "1"
      MANAGEMENT_API_KEY:         ${MANAGEMENT_API_KEY:-test-management-key}
      ALLOW_UNAUTH_MANAGEMENT:    ${ALLOW_UNAUTH_MANAGEMENT:-false}
      MAX_BODY_BYTES:             "10485760"
      DB_MAX_CONNECTIONS:         "20"
      DB_ACQUIRE_TIMEOUT_SECS:    "5"
      DB_IDLE_TIMEOUT_SECS:       "300"
      RATE_LIMIT_RPM:             "0"
      RATE_LIMIT_BURST:           "20"
      MEMORY_DECAY_RATE:          "0.0"
      IMPORTANCE_BOOST_FACTOR:    "0.0"
      IMPORTANCE_REFRESH_BOOST:   "0.05"
      DEDUP_THRESHOLD:            "0.0"
      CONFLICT_DETECTION_ENABLED: "false"
      RUST_LOG:                   "memoryos_kernel=debug,tower_http=info"
      PORT:                       "8080"
    depends_on:
      postgres:
        condition: service_healthy
      mock-openai:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Dashboard (Next.js) ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL:              http://memoryos:8080
      MANAGEMENT_API_KEY:       ${MANAGEMENT_API_KEY:-test-management-key}
      ALLOW_UNAUTH_MANAGEMENT:  ${ALLOW_UNAUTH_MANAGEMENT:-false}
      AUTH_SECRET:              test-auth-secret-for-testing
      NEXTAUTH_URL:             http://localhost:3000
      DASHBOARD_ADMIN_EMAIL:    admin@memoryos.dev
      DASHBOARD_ADMIN_PASSWORD: changeme
      DASHBOARD_ADMINS:         admin@memoryos.dev
    depends_on:
      memoryos:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_test_data:
